<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Job Portal | Smart Matching</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 flex flex-col min-h-screen">

    <header class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-50">
        <nav class="container mx-auto px-6 py-4 flex justify-between items-center">
            <div class="flex items-center space-x-2">
                <div class="bg-blue-600 p-1.5 rounded-lg">
                    <i data-lucide="zap" class="text-white w-5 h-5"></i>
                </div>
                <span class="text-xl font-bold tracking-tight text-slate-900">AI<span class="text-blue-600">Hire</span></span>
            </div>

            <div class="hidden md:flex items-center space-x-8 text-sm font-semibold">
                <a href="/" class="text-slate-600 hover:text-blue-600 transition">Browse Jobs</a>
                {% if user.is_authenticated %}
                    <a href="#" class="text-slate-600 hover:text-blue-600 transition">Dashboard</a>
                    <span class="text-slate-300">|</span>
                    <span class="text-slate-500 font-normal">Hello, {{ user.username }}</span>
                    <a href="#" class="text-red-500 hover:text-red-700 transition">Logout</a>
                {% else %}
                    <a href="#" class="text-slate-600 hover:text-blue-600 transition text-sm">Login</a>
                    <a href="{% url 'register' %}" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl shadow-lg shadow-blue-200 hover:bg-blue-700 transition">
                        Join Now
                    </a>
                {% endif %}
            </div>
        </nav>
    </header>

    <main class="flex-grow">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="bg-white border-t border-slate-200 py-10 mt-20">
        <div class="container mx-auto px-6 flex flex-col md:flex-row justify-between items-center">
            <p class="text-slate-500 text-sm">&copy; 2026 AI Job Portal. Built for precision.</p>
            <div class="flex space-x-6 mt-4 md:mt-0 text-slate-400">
                <i data-lucide="twitter" class="w-5 h-5 cursor-pointer hover:text-blue-400"></i>
                <i data-lucide="linkedin" class="w-5 h-5 cursor-pointer hover:text-blue-700"></i>
                <i data-lucide="github" class="w-5 h-5 cursor-pointer hover:text-slate-900"></i>
            </div>
        </div>
    </footer>

    <script>
        // Start the icons
        lucide.createIcons();
    </script>
</body>
</html>
